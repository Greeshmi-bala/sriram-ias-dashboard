<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anubhuti III - Examination Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .top-header {
      background: #ffffff;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .years-logo { height: 52px; }
    .main-logo  { height: 56px; }

    /* ── BANNER ── */
    .banner-section {
      width: 100%;
      max-height: 380px;
      overflow: hidden;
      background: #c7d2e8;
    }

    .banner-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ── CONTENT SECTION ── */
    .content-section {
      display: flex;
      gap: 40px;
      padding: 50px 60px;
      max-width: 1300px;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* ── LEFT ── */
    .left-content {
      flex: 1;
      padding-top: 10px;
    }

    .title {
      font-family: 'Libre Baskerville', serif;
      font-size: 76px;
      font-weight: 700;
      color: #0b1b3b;
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #c53030;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .blue-text { color: #1d4ed8; }
    .gray-text  { color: #6b7280; }
    .pink-text  { color: #f9a8d4; }
    .dot        { color: #9ca3af; margin: 0 8px; }

    .exam-card {
      display: inline-block;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 28px;
      min-width: 230px;
    }

    .exam-label {
      font-size: 12px;
      color: #9ca3af;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .exam-date {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    /* ── RIGHT / LOGIN CARD ── */
    .right-content {
      width: 420px;
      flex-shrink: 0;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.07);
    }

    .card-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 22px;
      font-weight: 700;
      color: #1d4ed8;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 12px 14px;
      background: #f9fafb;
      margin-bottom: 6px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #0b1b3b;
      background: #fff;
    }

    .input-icon {
      margin-right: 10px;
      display: flex;
      align-items: center;
      font-size: 15px;
      opacity: 0.6;
    }

    .phone-icon-img {
      width: 16px;
      height: 16px;
      opacity: 0.5;
    }

    .input-wrapper input {
      border: none;
      outline: none;
      flex: 1;
      background: transparent;
      font-size: 14px;
      color: #111827;
      font-family: 'Inter', sans-serif;
    }

    .input-wrapper input::placeholder {
      color: #9ca3af;
      font-size: 13px;
    }

    .error-message {
      color: #b91c1c;
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 16px;
    }

    .login-btn {
      width: 100%;
      background: #0b1b3b;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 18px;
    }

    .login-btn:hover  { background: #1e3a6e; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .assistance-text {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }

    .assistance-text span { font-weight: 700; color: #111827; }
    .assist-icon { margin-right: 4px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .content-section { flex-direction: column; padding: 30px 24px; gap: 30px; }
      .right-content   { width: 100%; }
      .title           { font-size: 52px; }
    }

    @media (max-width: 480px) {
      .top-header      { padding: 12px 20px; }
      .years-logo      { height: 38px; }
      .main-logo       { height: 42px; }
      .banner-section  { max-height: 200px; }
      .content-section { padding: 20px 16px; }
      .title           { font-size: 38px; }
      .subtitle        { font-size: 16px; }
      .tagline         { font-size: 17px; }
      .login-card      { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page">

      <!-- HEADER -->
      <header class="top-header">
        <div class="logo-row">
          <img src="/assets/logos-40-years 1.png" alt="40 Years Icon" class="years-logo" />
          <img src="/assets/SRIRAM's-IAS.png" alt="Sriram IAS Logo" class="main-logo" />
        </div>
      </header>

      <!-- BANNER -->
      <section class="banner-section">
        <img src="/assets/ANUBHUTI-III-Banner.JPG.jpeg" alt="Banner" class="banner-image" />
      </section>

      <!-- MAIN CONTENT -->
      <section class="content-section">

        <!-- LEFT -->
        <div class="left-content">
          <h1 class="title">ANUBHUTI III</h1>
          <p class="subtitle">All India Open Mock Test 2026</p>
          <p class="tagline">
            <span class="blue-text">TEST</span>
            <span class="dot">.</span>
            <span class="gray-text">RANK</span>
            <span class="dot">.</span>
            <span class="pink-text">RISE</span>
          </p>
          <div class="exam-card">
            <p class="exam-label">Examination Date</p>
            <p class="exam-date">April 18th Saturday, 2026</p>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="right-content">
          <div class="login-card">
            <h2 class="card-title">CANDIDATE DETAILS</h2>
            <label for="mobileNumber" class="input-label">Mobile Number</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="/assets/phone-solid-full.svg" alt="phone icon" class="phone-icon-img"
                     onerror="this.outerHTML='📱'" />
              </span>
              <input
                type="tel"
                id="mobileNumber"
                maxlength="10"
                placeholder="Enter your registered 10 digit mobile number"
                autocomplete="off"
                pattern="[0-9]{10}"
              />
            </div>
            <p id="errorMessage" class="error-message"></p>
            <button id="loginBtn" class="login-btn">Login →</button>
            <p class="assistance-text">
              <span class="assist-icon">🎧</span>
              For any Assistance call <span>9811489560</span>
            </p>
          </div>
        </div>

      </section>
    </div>
  </div>

  <script>
    const hostname = window.location.hostname;
    const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
    const API_BASE_URL = isLocalhost
      ? 'http://localhost:5000'
      : 'https://sriram-ias.onrender.com';

    const mobileInput = document.getElementById('mobileNumber');
    const loginBtn    = document.getElementById('loginBtn');
    const errorMsg    = document.getElementById('errorMessage');

    // Only allow digits
    mobileInput.addEventListener('input', () => {
      mobileInput.value = mobileInput.value.replace(/\D/g, '');
      errorMsg.textContent = '';
    });

    // Enter key support
    mobileInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    loginBtn.addEventListener('click', async () => {
      const phone = mobileInput.value.trim();

      if (!phone || phone.length !== 10 || !/^\d{10}$/.test(phone)) {
        errorMsg.textContent = 'Invalid mobile number. Please enter a valid 10-digit number.';
        return;
      }

      setLoading(true);

      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 10000);

        const response = await fetch(`${API_BASE_URL}/auth/verify-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone }),
          signal: controller.signal
        });

        if (response.ok) {
          window.location.href = `dashboard.html?phone=${encodeURIComponent(phone)}`;
        } else {
          errorMsg.textContent = 'Invalid mobile number. Please check and try again.';
        }
      } catch (err) {
        errorMsg.textContent = 'Unable to connect. Please try again.';
      } finally {
        setLoading(false);
      }
    });

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? 'Verifying... ⏳' : 'Login →';
    }
  </script>
</body>
</html>
